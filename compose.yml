    #     volumes:
    #         - /usr/share/zoneinfo/Asia/Tokyo:/etc/localtime:ro
    #     stop_grace_period: 0.5s
    #     tty: true

    postgres:
        image: postgres:16
        container_name: postgres
        hostname: postgres
        restart: always
        networks:
            - cobitis-link
        expose:
            - 5432:5432/tcp
        env_file:
            - ./.secrets/postgres.env
        environment:
            - TZ=Asia/Tokyo
        volumes:
            - /usr/share/zoneinfo/Asia/Tokyo:/etc/localtime:ro
            - ./postgres/initdb.d:/docker-entrypoint-initdb.d:ro
            - postgres-store:/var/lib/postgresql/data:rw

    # nginx:
    #     image: nginx
    #     container_name: nginx
    #     hostname: nginx
