name: cobitis

services:
    # api:
    #     build: ./api
    #     container_name: api
    #     hostname: api
    #     restart: always
    #     depends_on:
    #         - postgres
    #     networks:
    #         - cobitis-link
    #     expose:
    #         - 8080:8080/tcp
