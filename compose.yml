    #     ports:
    #         - 443:443/tcp
    #     secrets:
    #         - fullchain.pem
    #         - privkey.pem
    #         - dhparam.pem
    #     env_file:
    #         - ./.secrets/nginx.env
    #     environment:
    #         - TZ=Asia/Tokyo
    #     volumes:
    #         - /usr/share/zoneinfo/Asia/Tokyo:/etc/timezone:ro
    #         - ./nginx/templates:/etc/nginx/templates:ro
    #     stop_grace_period: 0.5s

networks:
    cobitis-link:
        external: false
        name: cobitis.internal

volumes:
    postgres-store: {}

secrets:
    fullchain.pem:
        file: ./.secrets/fullchain.pem
    privkey.pem:
        file: ./.secrets/privkey.pem
    dhparam.pem:
        file: ./.secrets/dhparam.pem
